<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KBATCH Portal Backoffice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                50:  '#EFF6FF',
                100: '#DBEAFE',
                200: '#BFDBFE',
                300: '#93C5FD',
                400: '#60A5FA',
                500: '#0666EB',
                600: '#0553C7',
                700: '#0444A3',
                800: '#033580',
                900: '#022660',
              },
              sidebar: {
                DEFAULT: '#0B1628',
                hover:   '#131F35',
                footer:  '#070E1B',
                border:  'rgba(255,255,255,0.06)',
              },
              topbar: {
                DEFAULT: '#0F1A2E',
                border:  'rgba(255,255,255,0.06)',
              },
              primary:   '#0666EB',
              success:   '#10B981',
              warning:   '#F59E0B',
              danger:    '#EF4444',
              info:      '#06B6D4',
            },
            fontFamily: {
              display: ['"Red Hat Display"', 'Inter', 'system-ui', 'sans-serif'],
              body:    ['Inter', '"Red Hat Display"', 'system-ui', 'sans-serif'],
            },
            spacing: {
              '18': '4.5rem',
              '78': '19.5rem',
            },
            width: {
              'sidebar': '312px',
              'sidebar-collapsed': '72px',
            },
            height: {
              'topbar': '72px',
            },
            borderRadius: {
              'kds': '8px',
            },
            boxShadow: {
              'focus-ring': '0 0 0 3px rgba(6, 102, 235, 0.15)',
              'sidebar': '4px 0 24px rgba(0, 0, 0, 0.15)',
            },
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css">
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
</head>
  <body class="antialiased overflow-hidden">
    <div id="root"></div>
  <script src="/config.js" onerror="console.warn('config.js no encontrado, usando fallback local')"></script>
  <script>
  if (!window.kbatch_selector_enviroments) {
    console.error("No se cargó config.js o no definió kbatch_selector_enviroments");
  }
  </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
